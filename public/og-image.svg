<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#122337"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Glow effects -->
  <circle cx="300" cy="315" r="250" fill="#e8c547" opacity="0.03"/>
  <circle cx="900" cy="315" r="250" fill="#e8c547" opacity="0.02"/>
  <!-- Logo - new concentric circles -->
  <g transform="translate(540, 100)">
    <circle cx="60" cy="60" r="54" fill="none" stroke="#e8c547" stroke-width="2.5" stroke-dasharray="5 5" />
    <circle cx="60" cy="60" r="35" fill="none" stroke="#e8c547" stroke-width="6" />
    <circle cx="60" cy="60" r="7" fill="#e8c547" />
  </g>
  <!-- Molecule network decoration -->
  <g opacity="0.06">
    <circle cx="150" cy="200" r="4" fill="#e8c547"/>
    <circle cx="250" cy="150" r="3" fill="#e8c547"/>
    <circle cx="100" cy="400" r="3" fill="#e8c547"/>
    <line x1="150" y1="200" x2="250" y2="150" stroke="#e8c547" stroke-width="1"/>
    <line x1="150" y1="200" x2="100" y2="400" stroke="#e8c547" stroke-width="1"/>
    <circle cx="1050" cy="200" r="4" fill="#e8c547"/>
    <circle cx="1100" cy="350" r="3" fill="#e8c547"/>
    <circle cx="950" cy="150" r="3" fill="#e8c547"/>
    <line x1="1050" y1="200" x2="1100" y2="350" stroke="#e8c547" stroke-width="1"/>
    <line x1="1050" y1="200" x2="950" y2="150" stroke="#e8c547" stroke-width="1"/>
  </g>
  <!-- Title -->
  <text x="600" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="white">Pepti<tspan fill="#e8c547">drop</tspan></text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="400" font-size="28" fill="#9CA3AF">#1 AI Peptide Research &amp; Protocol Platform</text>
  <!-- Stats bar -->
  <text x="600" y="480" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="600" font-size="22" fill="#e8c547">345+ Peptides  ·  AI Protocol Engine  ·  Synergy Mapping  ·  Risk Simulation</text>
  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="#e8c547"/>
</svg>
